<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - برق</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="logo">
            <div class="sparkle-icon">✦</div>
        </div>

        <div class="header-text">
            <h1>هلا فيك في برق</h1>
            <p>الرجاء إدخال رقم الجوال</p>
        </div>

        <div class="input-container">
            <div class="phone-input-wrapper">
                <div class="country-code">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Flag_of_Saudi_Arabia.svg" alt="SA Flag" class="flag">
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div class="input-field">
                    <label>رقم الجوال</label>
                    <input type="tel" placeholder="05" id="phoneInput">
                </div>
            </div>
        </div>

        <div class="referral-link">
            <a href="#">رمز دعوة من صديق؟</a>
        </div>

        <div class="footer">
            <p class="terms">
                من خلال الاستمرار فإنك توافق على <br>
                <a href="#">الشروط والأحكام</a> و <a href="#">سياسات خصوصية البيانات</a>
            </p>
            <button id="submitBtn" class="continue-btn" disabled>استمرار</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
