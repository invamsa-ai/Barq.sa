<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - برق</title>
    <style>
        /* --- CSS Style --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* الجزء الخاص بالشعار (الصورة) */
        .logo-section {
            margin-top: 60px;
            margin-bottom: 30px;
        }

        .sparkle-logo {
            width: 80px; 
            height: auto;
            display: block;
        }

        /* النصوص */
        .welcome-text h1 {
            font-size: 26px;
            font-weight: 700;
            color: #000;
            margin-bottom: 5px;
            text-align: center;
        }

        .welcome-text p {
            color: #777;
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* حقل إدخال رقم الجوال - تم تعديله ليصبح من اليمين لليسار */
        .input-group {
            width: 100%;
            border: 2px solid #FFD700; 
            border-radius: 18px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            flex-direction: row; /* تم التعديل ليتماشى مع RTL */
            transition: border-color 0.3s;
        }

        .country-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-left: 10px; /* مسافة بعد العلم */
            border-left: 1px solid #eee; /* الخط الفاصل على اليسار */
            margin-left: 12px;
        }

        .flag-icon {
            width: 28px;
            height: 20px;
            object-fit: cover;
            border-radius: 3px;
        }

        .arrow-down {
            font-size: 10px;
            color: #ccc;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: right;
        }

        .input-wrapper label {
            font-size: 11px;
            color: #bbb;
            margin-bottom: 2px;
        }

        .input-wrapper input {
            border: none;
            outline: none;
            font-size: 18px;
            color: #333;
            background: transparent;
            font-weight: 500;
            text-align: right; /* محاذاة النص داخل الحقل لليمين */
        }

        /* رمز الدعوة */
        .referral-section {
            margin-top: 30px;
            width: 100%;
            text-align: center;
        }

        .referral-section a {
            text-decoration: none;
            color: #000;
            font-weight: 600;
            font-size: 15px;
        }

        /* الجزء السفلي */
        .bottom-section {
            margin-top: auto;
            width: 100%;
            text-align: center;
            padding-bottom: 30px;
        }

        .terms-text {
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .terms-text span {
            color: #000;
            font-weight: bold;
        }

        /* زر الاستمرار */
        .btn-continue {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: none;
            background-color: #EAEAEA;
            color: #B0B0B0;
            font-size: 18px;
            font-weight: bold;
            cursor: not-allowed;
            transition: all 0.3s ease;
        }

        .btn-continue.active {
            background-color: #000;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="logo-section">
            <img src="barq.png" alt="barq" class="sparkle-logo" id="logoImg">
        </div>

        <div class="welcome-text">
            <h1>هلا فيك في برق</h1>
            <p>الرجاء إدخال رقم الجوال</p>
        </div>

        <div class="input-group">
            <div class="country-selector">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Flag_of_Saudi_Arabia.svg" alt="SA" class="flag-icon">
                <span class="arrow-down">▼</span>
            </div>
            
            <div class="input-wrapper">
                <label>رقم الجوال</label>
                <input type="tel" id="phoneInput" placeholder="05" maxlength="10">
            </div>
        </div>

        <div class="referral-section">
            <a href="#">رمز دعوة من صديق؟</a>
        </div>

        <div class="bottom-section">
            <p class="terms-text">
                من خلال الاستمرار فإنك توافق على <br>
                <span>الشروط والأحكام</span> و <span>سياسات خصوصية البيانات</span>
            </p>
            <button id="submitBtn" class="btn-continue" disabled>استمرار</button>
        </div>
    </div>

    <script>
        const phoneInput = document.getElementById('phoneInput');
        const submitBtn = document.getElementById('submitBtn');

        phoneInput.addEventListener('input', () => {
            if (phoneInput.value.trim().length >= 9) {
                submitBtn.classList.add('active');
                submitBtn.disabled = false;
            } else {
                submitBtn.classList.remove('active');
                submitBtn.disabled = true;
            }
        });

        phoneInput.addEventListener('keypress', (e) => {
            if (!/[0-9]/.test(e.key)) {
                e.preventDefault();
            }
        });
    </script>

</body>
</html>
